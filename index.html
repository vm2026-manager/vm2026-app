<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mine podcastfavoritter</title>
    <meta
      name="description"
      content="Mads Asps personlige rangliste over podcasts – udvalgt og delt til inspiration for andre lyttere."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=11" />
    <script src="app.js?v=11" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <div class="layout">
        <aside class="sidebar">
          <div class="sidebar__inner">
            <div class="brand-badge">P</div>

            <section class="sidebar-card">
              <h2 class="sidebar-title">Genre</h2>
              <p class="sidebar-note">Filtrer på genre</p>
              <div id="genreChips" class="genre-chips"></div>
            </section>

            <section class="sidebar-card">
              <label class="sidebar-label" for="searchInput">Søg</label>
              <input
                id="searchInput"
                class="sidebar-input"
                type="search"
                placeholder="Søg efter titel, vært eller udgiver"
              />
            </section>

            <section class="sidebar-card">
              <label class="sidebar-label" for="sortSelect">Sorter efter</label>
              <select id="sortSelect" class="sidebar-select">
                <option value="placement-asc">Placering, lavest først</option>
                <option value="placement-desc">Placering, højest først</option>
              </select>
            </section>
          </div>
        </aside>

        <main class="content">
          <section class="hero-card">
            <p class="eyebrow">Personlig rangliste</p>
            <h1>Mine podcastfavoritter</h1>
            <p class="hero-copy">
              Mads Asps personlige rangliste over podcasts – udvalgt og delt til
              inspiration for andre lyttere.
            </p>
          </section>

          <section class="section-card">
            <div class="section-header">
              <div>
                <h2>Senest bedømte podcasts</h2>
                <p class="section-subtitle">De nyeste vurderinger</p>
              </div>
              <div id="recentSummary" class="section-pill">
                Viser de 3 seneste bedømmelser
              </div>
            </div>

            <div id="recentGrid" class="recent-grid"></div>
          </section>

          <div class="results-row">
            <p id="resultsText" class="results-text">Indlæser podcasts...</p>
          </div>

          <section>
            <div id="podcastGrid" class="podcast-grid"></div>
          </section>
        </main>
      </div>
    </div>

    <template id="recentCardTemplate">
      <article class="recent-card">
        <div class="recent-card__media"></div>
        <div class="recent-card__content">
          <h3 class="recent-card__title"></h3>
          <p class="recent-card__host"></p>
          <div class="recent-card__meta">
            <span class="recent-card__rating"></span>
            <span class="recent-card__date"></span>
          </div>
        </div>
      </article>
    </template>

    <template id="podcastCardTemplate">
      <article class="podcast-card">
        <div class="podcast-card__placement"></div>
        <div class="podcast-card__rating"></div>

        <div class="podcast-card__body">
          <div class="podcast-card__media-column">
            <div class="podcast-card__media"></div>
            <a class="podcast-card__link" target="_blank" rel="noopener noreferrer">
              Åbn link
            </a>
          </div>

          <div class="podcast-card__content">
            <div class="podcast-card__top">
              <h3 class="podcast-card__title"></h3>
              <p class="podcast-card__host"></p>
            </div>
          </div>
        </div>

        <div class="podcast-card__footer">
          <div class="podcast-card__chips"></div>
        </div>
      </article>
    </template>
  </body>
</html>
