<script>
  const DATA_URL = "data/player_pool_v1.json";
  const FIXTURES_URL = "data/fixtures_group.csv";
  const START_SECURITY_URL = "data/player_start_security_nt.csv";
  const OPTIMAL_SQUADS_URL = "data/optimal_squads_by_formation.json";
  const BUDGET_TOTAL = 50000000;
  const MAX_PER_TEAM = 4;
  const HISTORY_LIMIT = 30;

  const STORAGE_KEYS = {
    squad: "vm2026_squad_v2",
    formation: "vm2026_formation_v2"
  };

  const FORMATIONS = {
    "3-4-3": { df: 3, mf: 4, fw: 3 },
    "3-5-2": { df: 3, mf: 5, fw: 2 },
    "4-3-3": { df: 4, mf: 3, fw: 3 },
    "4-4-2": { df: 4, mf: 4, fw: 2 },
    "4-5-1": { df: 4, mf: 5, fw: 1 },
    "5-3-2": { df: 5, mf: 3, fw: 2 },
    "5-4-1": { df: 5, mf: 4, fw: 1 }
  };

  const POSITION_LABEL_TO_CODE = {
    "Målmand": "GK",
    "Forsvar": "DEF",
    "Midtbane": "MID",
    "Angriber": "FWD"
  };

  let allPlayers = [];
  let fixtures = [];
  let optimalSquads = [];
  let squad = JSON.parse(localStorage.getItem(STORAGE_KEYS.squad) || "{}");
  let currentFormation = localStorage.getItem(STORAGE_KEYS.formation) || "4-4-2";
  let activeSlotKey = null;
  let squadHistory = [];

  const formationSelect = document.getElementById("formationSelect");
  const pitch = document.getElementById("pitch");
  const activeSlotText = document.getElementById("activeSlotText");
  const searchInput = document.getElementById("searchInput");
  const teamFilter = document.getElementById("teamFilter");
  const positionFilter = document.getElementById("positionFilter");
  const sortSelect = document.getElementById("sortSelect");
  const tradeList = document.getElementById("tradeList");
  const tradeHelpText = document.getElementById("tradeHelpText");
  const spentValue = document.getElementById("spentValue");
  const bankValue = document.getElementById("bankValue");
  const playerCountValue = document.getElementById("playerCountValue");
  const statusBox = document.getElementById("statusBox");
  const topbarInfo = document.getElementById("topbarInfo");
  const optimizeBtn = document.getElementById("optimizeBtn");
  const fillMissingBtn = document.getElementById("fillMissingBtn");
  const undoBtn = document.getElementById("undoBtn");
  const clearTeamBtn = document.getElementById("clearTeamBtn");

  // ... resten af din kode er uændret ...

  async function init() {
    try {
      const playersResponsePromise = fetch(DATA_URL);
      const startMapPromise = loadStartSecurityMap();
      const fixturesPromise = loadFixtures();
      const optimalSquadsPromise = loadOptimalSquads();

      const [playersResponse, startMap] = await Promise.all([
        playersResponsePromise,
        startMapPromise,
        fixturesPromise,
        optimalSquadsPromise
      ]);

      if (!playersResponse.ok) {
        throw new Error(`Kunne ikke hente datafil: ${playersResponse.status}`);
      }

      const rawPlayers = await playersResponse.json();

      if (!Array.isArray(rawPlayers)) {
        throw new Error("Datafilen indeholder ikke en gyldig spillerliste.");
      }

      allPlayers = attachStartSecurity(rawPlayers, startMap);

      cleanSquadForCurrentFormation();
      buildTeamFilter();
      setupEvents();
      render();

      setInterval(renderTradeList, 60000);
    } catch (error) {
      console.error(error);
      showStatus("Kunne ikke indlæse spillerdata, startsandsynlighed, optimizer-data eller kampplan. Tjek at data/player_pool_v1.json, data/player_start_security_nt.csv, data/fixtures_group.csv samt data/optimal_squads_by_formation.json findes.", "error");
      tradeList.innerHTML = `<div style="padding:14px;color:#cbd5e1;">Ingen data indlæst.</div>`;
    }
  }

  init();
</script>
